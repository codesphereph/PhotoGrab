<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>PhotoGrab</title>
<meta name="theme-color" content="#5b3fa8">
<link rel="manifest" href="manifest.json">

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="icons/icon-48x48.png">
<link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">

<!-- Apple touch icons (all standard iOS sizes) -->
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="57x57" href="icons/apple-touch-icon-57x57.png">
<link rel="apple-touch-icon" sizes="60x60" href="icons/apple-touch-icon-60x60.png">
<link rel="apple-touch-icon" sizes="72x72" href="icons/apple-touch-icon-72x72.png">
<link rel="apple-touch-icon" sizes="76x76" href="icons/apple-touch-icon-76x76.png">
<link rel="apple-touch-icon" sizes="114x114" href="icons/apple-touch-icon-114x114.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120x120.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/apple-touch-icon-144x144.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152x152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167x167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180x180.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhotoGrab">
<style>
  :root{
    --purple:#5b3fa8;
    --purple2:#7a5cd6;
    --purple3:#3d2778;
    --cream:#f5ede1;
    --deep:#0d0d0d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--deep);overflow:hidden}
  #appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:var(--deep)}

  /* ---------- splash ---------- */
  #splash{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:24px;
    background:radial-gradient(circle at 50% 40%, #1c1430 0%, #0d0d0d 70%);
    transition:opacity .5s ease, visibility .5s ease;
  }
  #splash.hide{opacity:0;visibility:hidden}

  .logo-wrap{
    position:relative;width:200px;height:200px;
    display:flex;align-items:center;justify-content:center;
  }
  .logo-wrap img{
    width:136px;height:136px;border-radius:32px;
    box-shadow:0 0 36px rgba(122,92,214,.45);
    position:relative;z-index:2;
    object-fit:cover;
    background:var(--cream);
  }

  /* spinning rings matching purple palette */
  .ring{position:absolute;border-radius:50%;border:2.5px solid transparent;}
  .r1{
    width:200px;height:200px;
    border-top-color:var(--purple);border-right-color:var(--purple);
    animation:spin 1.6s linear infinite;
    filter:drop-shadow(0 0 8px rgba(91,63,168,.75));
  }
  .r2{
    width:160px;height:160px;
    border-bottom-color:var(--purple2);border-left-color:var(--purple2);
    animation:spin 2.2s linear infinite reverse;
    filter:drop-shadow(0 0 6px rgba(122,92,214,.6));
  }
  .r3{
    width:118px;height:118px;
    border-top-color:var(--purple3);border-left-color:var(--purple3);
    animation:spin 1.1s linear infinite;
    filter:drop-shadow(0 0 4px rgba(61,39,120,.6));
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .brand{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#ffffff;font-weight:700;font-size:22px;letter-spacing:1px;
    text-shadow:0 0 20px rgba(122,92,214,.4);
    text-align:center;
  }
  .brand span{color:var(--purple2)}
  .tagline{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#6b6b6b;font-size:11.5px;letter-spacing:3px;
    text-transform:uppercase;margin-top:-14px;
  }

  .retry{margin-top:6px;display:none;font-family:-apple-system,sans-serif}
  .retry a{color:var(--purple2);font-size:13px;text-decoration:underline;cursor:pointer}

  /* ---------- install banner ---------- */
  #installBanner{
    position:fixed;
    left:0;right:0;bottom:0;
    z-index:20;
    display:none;
    align-items:center;
    gap:12px;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,#241a3f,#150f26);
    border-top:1px solid rgba(122,92,214,.35);
    box-shadow:0 -6px 24px rgba(0,0,0,.4);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    transform:translateY(110%);
    transition:transform .35s ease;
  }
  #installBanner.show{ display:flex; transform:translateY(0); }
  #installBanner img{
    width:42px;height:42px;border-radius:11px;flex-shrink:0;
    box-shadow:0 0 10px rgba(122,92,214,.4);
  }
  #installBanner .txt{flex:1;min-width:0}
  #installBanner .txt .t1{color:#fff;font-weight:700;font-size:14px}
  #installBanner .txt .t2{color:#a89fc0;font-size:12px;margin-top:2px}
  #installBanner button{
    border:0;border-radius:20px;
    padding:9px 16px;
    font-weight:700;font-size:13px;
    font-family:inherit;
    cursor:pointer;
    white-space:nowrap;
  }
  #installBtn{
    background:var(--purple2);color:#fff;
  }
  #dismissBtn{
    background:transparent;color:#8a80a3;
    padding:9px 10px;
  }
</style>
</head>
<body>
  <iframe
    id="appFrame"
    title="PhotoGrab"
    allow="camera; clipboard-write; clipboard-read">
  </iframe>

  <div id="splash">
    <div class="logo-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <img src="icon.png" alt="PhotoGrab Logo">
    </div>
    <div class="brand">Photo<span>Grab</span></div>
    <div class="tagline">Loading</div>
    <div class="retry" id="retry">
      <a id="retryLink">Taking too long? Tap to retry</a>
    </div>
  </div>

  <div id="installBanner">
    <img src="icon.png" alt="PhotoGrab">
    <div class="txt">
      <div class="t1">Install PhotoGrab</div>
      <div class="t2">Add to your home screen for quick access</div>
    </div>
    <button id="dismissBtn">Not now</button>
    <button id="installBtn">Install</button>
  </div>

<script>
  // ---- Hardcoded Apps Script web app URL ----
  var APP_URL = 'https://script.google.com/macros/s/AKfycbxRvCFAB6qnuFHKrcmN_1P9LfetV0nbwL-IyvenwVB54UGDnHECU2nlcnjZjV6KEkMI/exec';

  var frame  = document.getElementById('appFrame');
  var splash = document.getElementById('splash');
  var retry  = document.getElementById('retry');
  var hidden = false;

  function hideSplash(){ if(hidden) return; hidden = true; splash.classList.add('hide'); }

  frame.addEventListener('load', function(){ setTimeout(hideSplash, 350); });

  setTimeout(function(){ if(!hidden) retry.style.display = 'block'; }, 15000);
  document.getElementById('retryLink').addEventListener('click', function(){
    retry.style.display = 'none';
    frame.src = APP_URL + (APP_URL.indexOf('?') < 0 ? '?' : '&') + 'r=' + Date.now();
  });

  frame.src = APP_URL;

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }

  // ---------------- Install banner ----------------
  var deferredPrompt = null;
  var banner = document.getElementById('installBanner');
  var installBtn = document.getElementById('installBtn');
  var dismissBtn = document.getElementById('dismissBtn');
  var DISMISS_KEY = 'pg_install_dismissed';

  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
  }

  function wasDismissedRecently(){
    try{
      var t = localStorage.getItem(DISMISS_KEY);
      if(!t) return false;
      // hide banner for 7 days after dismissal
      return (Date.now() - parseInt(t,10)) < (7*24*60*60*1000);
    }catch(e){ return false; }
  }

  function showBanner(){
    if(isStandalone() || wasDismissedRecently()) return;
    banner.classList.add('show');
  }

  function hideBanner(){
    banner.classList.remove('show');
  }

  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    showBanner();
  });

  installBtn.addEventListener('click', function(){
    hideBanner();
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.finally(function(){
      deferredPrompt = null;
    });
  });

  dismissBtn.addEventListener('click', function(){
    hideBanner();
    try{ localStorage.setItem(DISMISS_KEY, Date.now().toString()); }catch(e){}
  });

  window.addEventListener('appinstalled', function(){
    hideBanner();
    deferredPrompt = null;
  });

  // iOS Safari has no beforeinstallprompt event — show a manual hint instead.
  function isIos(){
    return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
  }
  if (isIos() && !isStandalone() && !wasDismissedRecently()) {
    document.querySelector('#installBanner .t2').textContent =
      'Tap the Share icon, then "Add to Home Screen"';
    setTimeout(showBanner, 1200);
  }
</script>
</body>
</html>
